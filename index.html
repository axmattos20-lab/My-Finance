<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Projeto GitHub</title>
    <style>
        /* Estilos básicos para uma apresentação limpa */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 {
            color: #24292e;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.1rem;
            color: #586069;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background-color: #2ea44f;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #2c974b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Olá, Mundo! 🚀</h1>
        <p>Este é o ponto de partida do meu novo projeto hospedado no GitHub Pages.</p>
        <a href="https://github.com" target="_blank" class="btn">Visitar meu GitHub</a>
    </div>

</body>
</html>
